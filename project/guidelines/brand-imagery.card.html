<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
  .img{height:140px;border-radius:var(--radius-md);background-size:cover;background-position:center;position:relative;box-shadow:var(--shadow-sm);overflow:hidden;}
  .scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(22,36,28,.45),rgba(22,36,28,0) 45%);}
  .cap{position:absolute;left:10px;top:8px;color:#fff;font-size:11px;font-weight:600;}
</style></head><body>
<div class="row">
  <div class="img" style="background-image:url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=600&q=70')"><div class="scrim"></div><div class="cap">Meadow</div></div>
  <div class="img" style="background-image:url('https://images.unsplash.com/photo-1444044205806-38f3ed106c10?w=600&q=70')"><div class="scrim"></div><div class="cap">Timberland</div></div>
  <div class="img" style="background-image:url('https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?w=600&q=70')"><div class="scrim"></div><div class="cap">Ridge</div></div>
  <div class="img" style="background-image:url('https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=600&q=70')"><div class="scrim"></div><div class="cap">Waterfront</div></div>
</div>
</body></html>
