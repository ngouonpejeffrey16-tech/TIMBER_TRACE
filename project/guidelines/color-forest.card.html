<!-- @dsCard group="Colors" viewport="700x150" name="Forest — primary" subtitle="Deep greens for primary surfaces & actions" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;}
  .row{display:grid;grid-template-columns:repeat(9,1fr);gap:0;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;}
  .sw b{font-size:11px;font-weight:600;}
  .sw span{font-size:10px;opacity:.8;font-family:var(--font-mono);}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--forest-900);color:#fff"><b>900</b><span>#16241c</span></div>
  <div class="sw" style="background:var(--forest-800);color:#fff"><b>800</b><span>#1f3026</span></div>
  <div class="sw" style="background:var(--forest-700);color:#fff"><b>700</b><span>#2a4233</span></div>
  <div class="sw" style="background:var(--forest-600);color:#fff"><b>600</b><span>#3a5a44</span></div>
  <div class="sw" style="background:var(--forest-500);color:#fff"><b>500</b><span>#4a7155</span></div>
  <div class="sw" style="background:var(--forest-400);color:#fff"><b>400</b><span>#6f9279</span></div>
  <div class="sw" style="background:var(--forest-300);color:#1a1a17"><b>300</b><span>#9db8a3</span></div>
  <div class="sw" style="background:var(--forest-200);color:#1a1a17"><b>200</b><span>#c7d6cb</span></div>
  <div class="sw" style="background:var(--forest-100);color:#1a1a17"><b>100</b><span>#e6eee8</span></div>
</div>
</body></html>
