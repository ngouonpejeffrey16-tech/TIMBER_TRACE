<!-- @dsCard group="Colors" viewport="700x150" name="Clay — accent" subtitle="Warm clay for the single key CTA & highlights" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;}
  .sw b{font-size:11px;font-weight:600;}
  .sw span{font-size:10px;opacity:.8;font-family:var(--font-mono);}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--clay-700);color:#fff"><b>700</b><span>#9c5f37</span></div>
  <div class="sw" style="background:var(--clay-600);color:#fff"><b>600</b><span>#b97544</span></div>
  <div class="sw" style="background:var(--clay-500);color:#2a1c12"><b>500</b><span>#c98a5e</span></div>
  <div class="sw" style="background:var(--clay-400);color:#2a1c12"><b>400</b><span>#d8a47e</span></div>
  <div class="sw" style="background:var(--clay-300);color:#2a1c12"><b>300</b><span>#e6c2a4</span></div>
  <div class="sw" style="background:var(--clay-200);color:#2a1c12"><b>200</b><span>#f0d8c4</span></div>
  <div class="sw" style="background:var(--clay-100);color:#2a1c12"><b>100</b><span>#f7ebe0</span></div>
</div>
</body></html>
