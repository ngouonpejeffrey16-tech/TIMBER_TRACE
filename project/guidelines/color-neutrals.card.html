<!-- @dsCard group="Colors" viewport="700x150" name="Stone & papers — neutrals" subtitle="Warm neutrals, cream page, paper surfaces" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;}
  .row{display:grid;grid-template-columns:repeat(8,1fr);gap:0;border-radius:var(--radius-sm);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;}
  .sw b{font-size:11px;font-weight:600;}
  .sw span{font-size:10px;opacity:.8;font-family:var(--font-mono);}
</style></head><body>
<div class="row">
  <div class="sw" style="background:var(--stone-900);color:#fff"><b>Stone 900</b><span>#1a1a17</span></div>
  <div class="sw" style="background:var(--stone-700);color:#fff"><b>700</b><span>#45433c</span></div>
  <div class="sw" style="background:var(--stone-500);color:#fff"><b>500</b><span>#76726a</span></div>
  <div class="sw" style="background:var(--stone-300);color:#1a1a17"><b>300</b><span>#c4c1b8</span></div>
  <div class="sw" style="background:var(--stone-100);color:#1a1a17"><b>100</b><span>#ece9e1</span></div>
  <div class="sw" style="background:var(--stone-50);color:#1a1a17"><b>50</b><span>#f5f3ec</span></div>
  <div class="sw" style="background:var(--cream);color:#1a1a17"><b>Cream</b><span>#faf8f3</span></div>
  <div class="sw" style="background:var(--paper);color:#1a1a17;box-shadow:inset 0 0 0 1px var(--border-subtle)"><b>Paper</b><span>#ffffff</span></div>
</div>
</body></html>
