<!-- @dsCard group="Spacing" viewport="700x170" name="Radius & shadow" subtitle="Corner radii and elevation" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px;}
  .row{display:flex;gap:22px;align-items:center;flex-wrap:wrap;}
  .box{width:84px;height:64px;background:var(--paper);border:1px solid var(--border-subtle);display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;}
  .l{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head><body>
<div class="row">
  <div class="box" style="border-radius:var(--radius-xs)"><span class="l">xs 2</span></div>
  <div class="box" style="border-radius:var(--radius-sm)"><span class="l">sm 4</span></div>
  <div class="box" style="border-radius:var(--radius-md)"><span class="l">md 6</span></div>
  <div class="box" style="border-radius:var(--radius-lg)"><span class="l">lg 10</span></div>
  <div class="box" style="border-radius:var(--radius-pill)"><span class="l">pill</span></div>
  <div style="width:1px;height:64px;background:var(--border-default)"></div>
  <div class="box" style="border:none;box-shadow:var(--shadow-sm);border-radius:var(--radius-md)"><span class="l">shadow-sm</span></div>
  <div class="box" style="border:none;box-shadow:var(--shadow-md);border-radius:var(--radius-md)"><span class="l">shadow-md</span></div>
  <div class="box" style="border:none;box-shadow:var(--shadow-lg);border-radius:var(--radius-md)"><span class="l">shadow-lg</span></div>
</div>
</body></html>
