<!-- @dsCard group="Colors" viewport="700x150" name="Semantic status" subtitle="Success, warning, danger, info pairs" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:20px;}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .chip{border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .fg{height:54px;display:flex;align-items:center;padding:0 14px;color:#fff;font-weight:600;font-size:13px;}
  .bg{height:34px;display:flex;align-items:center;padding:0 14px;font-size:12px;font-weight:600;}
</style></head><body>
<div class="row">
  <div class="chip"><div class="fg" style="background:var(--success-fg)">Success</div><div class="bg" style="background:var(--success-bg);color:var(--success-fg)">Title verified</div></div>
  <div class="chip"><div class="fg" style="background:var(--warning-fg)">Warning</div><div class="bg" style="background:var(--warning-bg);color:var(--warning-fg)">Offer pending</div></div>
  <div class="chip"><div class="fg" style="background:var(--danger-fg)">Danger</div><div class="bg" style="background:var(--danger-bg);color:var(--danger-fg)">Under contract</div></div>
  <div class="chip"><div class="fg" style="background:var(--info-fg)">Info</div><div class="bg" style="background:var(--info-bg);color:var(--info-fg)">Owner financing</div></div>
</div>
</body></html>
