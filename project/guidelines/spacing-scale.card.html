<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--bg-page);padding:24px;}
  .row{display:flex;align-items:flex-end;gap:16px;}
  .item{text-align:center;}
  .bar{background:var(--clay-500);border-radius:2px;width:28px;}
  .l{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-top:6px;}
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="height:var(--space-1)"></div><div class="l">1·4</div></div>
  <div class="item"><div class="bar" style="height:var(--space-2)"></div><div class="l">2·8</div></div>
  <div class="item"><div class="bar" style="height:var(--space-3)"></div><div class="l">3·12</div></div>
  <div class="item"><div class="bar" style="height:var(--space-4)"></div><div class="l">4·16</div></div>
  <div class="item"><div class="bar" style="height:var(--space-6)"></div><div class="l">6·24</div></div>
  <div class="item"><div class="bar" style="height:var(--space-8)"></div><div class="l">8·32</div></div>
  <div class="item"><div class="bar" style="height:var(--space-12)"></div><div class="l">12·48</div></div>
  <div class="item"><div class="bar" style="height:var(--space-16)"></div><div class="l">16·64</div></div>
</div>
</body></html>
