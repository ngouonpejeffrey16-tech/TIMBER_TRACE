<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Checkbox } = window.TimberTraceDesignSystem_61daa5;
function Demo() {
  const [v, setV] = React.useState('250,000');
  const [c1, setC1] = React.useState(true);
  const [c2, setC2] = React.useState(false);
  return (
    <div className="grid">
      <Input label="Max price" prefix="$" value={v} onChange={e=>setV(e.target.value)} hint="Per parcel" />
      <Select label="Sort by" options={["Newest","Price: low to high","Acreage"]} />
      <div style={{ display:'flex', flexDirection:'column', gap:12, paddingTop: 4 }}>
        <Checkbox label="Road access" checked={c1} onChange={()=>setC1(!c1)} />
        <Checkbox label="Owner financing" checked={c2} onChange={()=>setC2(!c2)} />
        <Checkbox label="Off-grid" disabled />
      </div>
      <Input label="Search location" placeholder="County, state, or ZIP" />
      <Input label="Min acreage" suffix="acres" placeholder="5" />
      <Input label="Email" error="Enter a valid email" value="dana@" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
